name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/kino-admin/web/pnpm-lock.yaml

      - name: Build admin SPA
        working-directory: crates/kino-admin/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache Cargo
        id: cargo-cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cargo-lock-${{ hashFiles('Cargo.lock') }}
          cache-workspace-crates: "true"

      - name: Log Cargo cache result
        run: |
          if [[ "${{ steps.cargo-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Cargo cache: hit"
          else
            echo "Cargo cache: miss"
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace

  spa:
    name: spa
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crates/kino-admin/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/kino-admin/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client
        run: pnpm gen

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
